<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="#" class="logo">My Blog</a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home">首页</a></li>
                <li><a href="#blog">文章</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
                <li><button id="themeToggle" class="theme-toggle" title="切换主题">🌙</button></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <h1>你好，我是 <span class="highlight">CJ</span></h1>
            <p class="subtitle">热爱技术，分享知识，记录成长</p>
            <div class="hero-btns">
                <a href="#blog" class="btn btn-primary">浏览文章</a>
                <a href="#about" class="btn btn-outline">关于我</a>
            </div>
        </div>
    </section>

    <section id="blog" class="section">
        <div class="container">
            <h2 class="section-title">最新文章</h2>
            <div class="blog-grid" id="blogGrid">
            </div>
        </div>
    </section>

    <section id="about" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
                <div class="about-avatar">👨‍💻</div>
                <div class="about-text">
                    <p>一名热爱技术的开发者，专注于 Web 开发和技术分享。</p>
                    <p>喜欢探索新事物，用文字记录学习过程中的思考与收获。</p>
                    <div class="skills">
                        <span class="skill-tag">HTML/CSS</span>
                        <span class="skill-tag">JavaScript</span>
                        <span class="skill-tag">React</span>
                        <span class="skill-tag">Node.js</span>
                        <span class="skill-tag">Python</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <div class="contact-links">
                <a href="mailto:your@email.com" class="contact-item">📧 Email</a>
                <a href="https://github.com/yourname" class="contact-item" target="_blank">🐙 GitHub</a>
                <a href="https://twitter.com/yourname" class="contact-item" target="_blank">🐦 Twitter</a>
            </div>
        </div>
    </section>

    <div class="post-overlay" id="postOverlay">
        <div class="post-modal">
            <button class="post-close" onclick="closePost()">✕</button>
            <h2 id="postTitle"></h2>
            <div class="post-meta">
                <span id="postDate"></span>
                <span class="tags" id="postTags"></span>
            </div>
            <div class="post-content" id="postContent"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 My Blog. All rights reserved.</p>
        </div>
    </footer>

    <script src="marked.min.js?v=2"></script>
    <script src="main.js?v=2"></script>
</body>
</html>
